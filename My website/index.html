<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janssen'life</title>
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html{
        scroll-behavior:smooth;
    }

    body{
        font-family:"Microsoft YaHei", Arial, sans-serif;
        background:
            radial-gradient(circle at top left, rgba(120,80,255,0.18), transparent 30%),
            radial-gradient(circle at top right, rgba(255,120,180,0.12), transparent 28%),
            linear-gradient(180deg, #0b0b12 0%, #0d1020 45%, #090909 100%);
        color:white;
        line-height:1.7;
    }

    a{
        text-decoration:none;
        color:white;
    }

    header{
        position:sticky;
        top:0;
        z-index:100;
        backdrop-filter:blur(14px);
        background:rgba(10,10,18,0.55);
        border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .nav{
        max-width:1200px;
        margin:auto;
        padding:18px 24px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .logo{
        font-size:20px;
        font-weight:700;
        letter-spacing:1px;
    }

    nav a{
        margin-left:24px;
        color:rgba(255,255,255,0.75);
        transition:0.3s;
    }

    nav a:hover{
        color:white;
    }

    .hero{
        max-width:1280px;
        margin:40px auto 0;
        padding:120px 30px;
        text-align:center;
        border-radius:32px;
        position:relative;
        overflow:hidden;
        background:
            linear-gradient(135deg, rgba(61,22,122,0.92), rgba(118,146,219,0.82)),
            url("images/album1/photo1.jpg") center/cover;
        box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    .hero::before{
        content:"";
        position:absolute;
        inset:0;
        background:rgba(10,10,20,0.28);
    }

    .hero-content{
        position:relative;
        z-index:2;
    }

    .hero h1{
        font-size:64px;
        line-height:1.2;
        margin-bottom:24px;
        font-weight:800;
        text-shadow:0 8px 30px rgba(0,0,0,0.25);
    }

    .hero p{
        font-size:28px;
        color:rgba(255,255,255,0.92);
        margin-bottom:34px;
    }

    .btn{
        display:inline-block;
        padding:16px 34px;
        border-radius:999px;
        background:rgba(255,255,255,0.92);
        color:#111;
        font-weight:700;
        transition:0.3s;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .btn:hover{
        transform:translateY(-2px) scale(1.02);
    }

    section{
        max-width:1200px;
        margin:90px auto;
        padding:0 24px;
    }

    h2{
        text-align:center;
        font-size:42px;
        margin-bottom:22px;
    }

    .section-desc{
        text-align:center;
        color:rgba(255,255,255,0.65);
        max-width:760px;
        margin:0 auto 40px;
        font-size:17px;
    }

    .about-box{
        max-width:860px;
        margin:0 auto;
        padding:32px;
        border-radius:24px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
        box-shadow:0 10px 30px rgba(0,0,0,0.18);
        text-align:center;
        color:rgba(255,255,255,0.8);
    }

    .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
        gap:26px;
        margin-top:26px;
    }

    .card{
        display:block;
        border-radius:24px;
        overflow:hidden;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
        box-shadow:0 12px 28px rgba(0,0,0,0.22);
        transition:0.35s;
        color:white;
    }

    .card:hover{
        transform:translateY(-8px);
        box-shadow:0 18px 40px rgba(0,0,0,0.3);
    }

    .card img{
        width:100%;
        height:300px;
        object-fit:cover;
        display:block;
    }

    .card .text{
        padding:18px 18px 20px;
    }

    .card h3{
        font-size:22px;
        margin-bottom:10px;
    }

    .card p{
        color:rgba(255,255,255,0.68);
        font-size:14px;
    }

    .contact-box{
        max-width:700px;
        margin:0 auto;
        padding:30px;
        border-radius:24px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.18);
    }

    .contact-box p{
        margin:10px 0;
        color:rgba(255,255,255,0.78);
        font-size:16px;
    }

    footer{
        text-align:center;
        padding:40px 20px 60px;
        color:rgba(255,255,255,0.45);
        font-size:14px;
    }
    #music-toggle{
        position:fixed;
        right:20px;
        bottom:20px;
        padding:10px 16px;
        border:none;
        border-radius:20px;
        background:rgba(255,255,255,0.9);
        color:#111;
        font-weight:bold;
        cursor:pointer;
        box-shadow:0 6px 15px rgba(0,0,0,0.3);
    }
</style>
</head>
<body>

    <footer>
        © 2026 我的个人网站

    <audio id="bgm" autoplay loop>
    <source src="music/banjuzaijian.mp3" type="audio/mpeg">
</audio>

<button id="music-toggle" onclick="toggleMusic()">关闭音乐</button>

<script>
const bgm = document.getElementById("bgm");
const btn = document.getElementById("music-toggle");

function toggleMusic(){
    if(bgm.paused){
        bgm.play();
        btn.innerText = "关闭音乐";
    }else{
        bgm.pause();
        btn.innerText = "播放音乐";
    }
}
</script>
