<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片集 1</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#111;
            color:white;
            line-height:1.6;
        }

        a{
            text-decoration:none;
            color:white;
        }

        header{
            padding:20px 40px;
            background:#1a1a1a;
        }

        .container{
            max-width:1100px;
            margin:auto;
            padding:50px 20px;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        .desc{
            text-align:center;
            color:#bbb;
            margin-bottom:40px;
        }

        .photos{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
            gap:20px;
        }

        .photos img{
            width:100%;
            height:320px;
            border-radius:16px;
            display:block;
            object-fit:cover;
        }

        .back{
            display:inline-block;
            margin-bottom:30px;
            background:white;
            color:black;
            padding:10px 18px;
            border-radius:10px;
            font-weight:bold;
        }
        .lightbox{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.85);
            justify-content:center;
            align-items:center;
            z-index:9999;
            padding:20px;
        }

        .lightbox img{
            max-width:90%;
            max-height:90%;
            border-radius:16px;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">← 返回首页</a>
    </header>

    <div class="container">
        <a href="index.html" class="back">返回首页</a>
        <h1>照片集 1</h1>
        <p class="desc">这里是这一组照片的故事。</p>

        <div class="photos">
            <img src="images/album1/Photo1.jpg" alt="照片1">
            <img src="images/album1/Photo2.jpg" alt="照片2">
            <img src="images/album1/Photo3.jpg" alt="照片3">
            <img src="images/album1/Photo4.jpg" alt="照片4">
        </div>
    </div>
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="放大图片">
</div>

<script>
    const images = document.querySelectorAll('.photos img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    images.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex';
            lightboxImg.src = img.src;
        });
    });

    function closeLightbox() {
        lightbox.style.display = 'none';
    }
</script>
</body>
</html>
